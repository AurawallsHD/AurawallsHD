<!DOCTYPE html>
<html>
<head>
<title>Free Wallpapers</title>
<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

img{
width:90%;
max-width:900px;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
margin-top:20px;
font-size:16px;
cursor:pointer;
}

#search{
padding:10px;
width:250px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Free Wallpapers</h1>

<input type="text" id="search" placeholder="Search wallpapers..." onkeyup="searchWallpaper()">

<div id="gallery">
<img src="wallpapers/wall1.jpg" class="wallpaper">
<button onclick="download('wallpapers/wall1.jpg')">Download</button>

<img src="wallpapers/wall2.jpg" class="wallpaper">
<button onclick="download('wallpapers/wall2.jpg')">Download</button>
<img src="wallpapers/wall1.jpg" class="wallpaper">
<br>
<button onclick="download('wallpapers/wall1.jpg')">Download</button>

</div>

<script>

function download(img){
window.open(img);
}

function searchWallpaper(){

let input = document.getElementById("search").value.toLowerCase();
let images = document.getElementsByClassName("wallpaper");

for(let i=0;i<images.length;i++){

let name = images[i].src.toLowerCase();

if(name.includes(input)){
images[i].style.display="block";
}else{
images[i].style.display="none";
}

}

}

</script>

</body>
</html>
