<!DOCTYPE html>
<html>
<head>
<title>AuraWallsHD</title>

<style>

body{
font-family: Arial;
background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
font-size:40px;
letter-spacing:2px;
}

#search{
padding:12px;
width:260px;
margin:20px;
border-radius:25px;
border:none;
outline:none;
font-size:16px;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

.wallpaper-card{
background:#1b1b2f;
padding:12px;
border-radius:12px;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.wallpaper-card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ffff;
}

.wallpaper-card img{
width:100%;
border-radius:10px;
}

button{
padding:10px 18px;
margin-top:10px;
cursor:pointer;
border:none;
border-radius:20px;
background:#00ffff;
color:black;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#00ff9d;
}

footer{
margin-top:30px;
padding:15px;
background:#111;
font-size:14px;
}

</style>

</head>

<body>

<h1>AuraWallsHD</h1>

<input type="text" id="search" placeholder="🔍 Search wallpapers..." onkeyup="searchWallpaper()">

<div id="gallery">

<div class="wallpaper-card">
<img src="wall1.jpg" class="wallpaper">
<button onclick="download('wall1.jpg')">Download</button>
</div>

<div class="wallpaper-card">
<img src="wall2.jpg" class="wallpaper">
<button onclick="download('wall2.jpg')">Download</button>
</div>

<div class="wallpaper-card">
<img src="wall3.jpg" class="wallpaper">
<button onclick="download('wall3.jpg')">Download</button>
</div>

</div>

<footer>
© 2026 AuraWallsHD
</footer>

<script>

function download(img){
window.open(img);
}

function searchWallpaper(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("wallpaper-card");

for(let i=0;i<cards.length;i++){

let img=cards[i].getElementsByTagName("img")[0].src.toLowerCase();

if(img.includes(input)){
cards[i].style.display="block";
}else{
cards[i].style.display="none";
}

}

}

</script>

</body>
</html>
