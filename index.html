<!DOCTYPE html>
<html>
<head>
<title>Free Wallpapers</title>
<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

img{
width:90%;
max-width:900px;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
margin-top:20px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Free Wallpapers</h1>

<img id="wallpaper" src="wallpapers/wall1.jpg">

<br>

<button onclick="download()">Download</button>

<script>

function download(){
let img = document.getElementById("wallpaper").src;
window.open(img);
}

</script>

</body>
</html>
